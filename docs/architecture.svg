<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 940" width="960" height="940" role="img" aria-label="Gated SRE Agent: k8s events trigger a read-only Observer and an LLM Diagnostician inside a trust boundary; their proposed fix must pass a human-approval gate before the agent acts (restart_pod) and verifies the result, looping back. A public eval harness scores verdict, trajectory, and honesty.">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #0f172a;
      --muted: #5b6473;
      --line: #94a3b8;
      --card: #ffffff;
      --edge: #cbd5e1;
      --panel: #f1f5f9;
      --accent: #1d4ed8;
      --accent-soft: #eff6ff;
      --high: #b45309;
      --high-soft: #fffbeb;
      --low: #0f766e;
      --low-soft: #f0fdfa;
      --bound: #be123c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --ink: #e6edf3;
        --muted: #9aa7b6;
        --line: #6b7787;
        --card: #161b22;
        --edge: #30363d;
        --panel: #11161d;
        --accent: #6ea8fe;
        --accent-soft: #16202f;
        --high: #e0a458;
        --high-soft: #211a10;
        --low: #4dd4ac;
        --low-soft: #10201c;
        --bound: #f47d92;
      }
    }
    .bg { fill: var(--bg); }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .t { font-size: 14.5px; font-weight: 650; fill: var(--ink); }
    .s { font-size: 11.5px; fill: var(--muted); }
    .lab { font-size: 11px; fill: var(--muted); }
    .cap { font-size: 10.5px; font-weight: 700; letter-spacing: 0.09em; }
    .card { fill: var(--card); stroke: var(--edge); stroke-width: 1.25; }
    .panel { fill: var(--panel); stroke: var(--edge); stroke-width: 1.25; }
    .orc { fill: var(--accent-soft); stroke: var(--accent); stroke-width: 1.75; }
    .hi { fill: var(--high-soft); stroke: var(--high); stroke-width: 1.5; }
    .lo { fill: var(--low-soft); stroke: var(--low); stroke-width: 1.5; }
    .gate { fill: var(--high-soft); stroke: var(--high); stroke-width: 2.5; }
    .conn { stroke: var(--line); stroke-width: 1.6; fill: none; }
    .conn-d { stroke: var(--line); stroke-width: 1.4; fill: none; stroke-dasharray: 4 3; }
    .conn-bound { stroke: var(--bound); stroke-width: 1.7; fill: none; }
    .bound-box { fill: none; stroke: var(--bound); stroke-width: 1.6; stroke-dasharray: 7 5; }
    .foot { font-size: 12px; fill: var(--muted); }
    .foot-t { font-size: 12.5px; font-weight: 700; fill: var(--ink); }
    .num { font-size: 12.5px; font-weight: 700; fill: var(--accent); }
    .denylab { font-size: 11px; font-weight: 700; fill: var(--bound); }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--line)"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--bound)"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="940"/>

  <!-- ============ triggers ============ -->
  <rect class="card" x="340" y="36" width="480" height="70" rx="8"/>
  <text class="t" x="580" y="66" text-anchor="middle">Triggers · Kubernetes events</text>
  <text class="s" x="580" y="86" text-anchor="middle">CrashLoopBackOff · OOMKilled · FailedScheduling</text>
  <text class="s" x="580" y="100" text-anchor="middle">watched-namespace allowlist · kube-system never touched</text>

  <path class="conn" d="M580,106 L580,150" marker-end="url(#a)"/>

  <!-- ============ trust boundary: observer + diagnostician ============ -->
  <rect class="bound-box" x="326" y="150" width="508" height="252" rx="10"/>
  <text class="cap" x="820" y="170" text-anchor="end" fill="var(--bound)">TRUST BOUNDARY · LOG TEXT IS UNTRUSTED</text>

  <rect class="lo" x="348" y="184" width="464" height="82" rx="8"/>
  <text class="t" x="580" y="212" text-anchor="middle">Observer — read-only (Perceive)</text>
  <text class="s" x="580" y="231" text-anchor="middle">fetch pod logs · events · recent rollouts · requests vs. capacity</text>
  <text class="s" x="580" y="247" text-anchor="middle">produces evidence only — attacker-influenceable log text stays here</text>

  <path class="conn" d="M580,266 L580,300" marker-end="url(#a)"/>
  <text class="lab" x="592" y="287">evidence</text>

  <rect class="orc" x="348" y="300" width="464" height="82" rx="8"/>
  <text class="t" x="580" y="328" text-anchor="middle">Diagnostician — LLM (Plan)</text>
  <text class="s" x="580" y="347" text-anchor="middle">rank root-cause hypotheses, each citing evidence steps that actually ran</text>
  <text class="s" x="580" y="363" text-anchor="middle">verdict + confidence + proposed fix — the only output that reaches the gate</text>

  <path class="conn" d="M580,402 L580,438" marker-end="url(#a)"/>
  <text class="lab" x="592" y="424">proposed fix</text>

  <!-- ============ the gate (hero) ============ -->
  <rect class="gate" x="326" y="438" width="508" height="98" rx="10"/>
  <text class="cap" x="580" y="466" text-anchor="middle" fill="var(--high)">HUMAN APPROVAL GATE</text>
  <text class="t" x="580" y="492" text-anchor="middle">explicit click — never inferred from text or a spoken &#8220;yes&#8221;</text>
  <text class="s" x="580" y="513" text-anchor="middle">renders plain-language fix · evidence · confidence</text>
  <text class="s" x="580" y="527" text-anchor="middle">1h timeout &#8594; expire · stale approval re-verified before Act</text>

  <!-- approve branch -->
  <path class="conn" d="M580,536 L580,576" marker-end="url(#a)"/>
  <text class="lab" x="592" y="562">approve</text>

  <!-- deny branch -> audit -->
  <path class="conn-bound" d="M326,487 L284,487" marker-end="url(#ar)"/>
  <text class="denylab" x="305" y="478" text-anchor="middle">deny</text>

  <!-- ============ act ============ -->
  <rect class="hi" x="340" y="576" width="480" height="82" rx="8"/>
  <text class="t" x="580" y="604" text-anchor="middle">Act — restart_pod</text>
  <text class="s" x="580" y="623" text-anchor="middle">the only M1 action · draft-only until eval ≥ 0.90 over ≥ 20 runs</text>
  <text class="s" x="580" y="639" text-anchor="middle">bare-pod guard · in-cluster ServiceAccount · RBAC write = pods/delete only</text>

  <path class="conn" d="M580,658 L580,694" marker-end="url(#a)"/>

  <!-- ============ observe / verify ============ -->
  <rect class="card" x="340" y="694" width="480" height="74" rx="8"/>
  <text class="t" x="580" y="722" text-anchor="middle">Observe — verify the fix</text>
  <text class="s" x="580" y="741" text-anchor="middle">did it actually help? a failed fix escalates with before/after evidence —</text>
  <text class="s" x="580" y="757" text-anchor="middle">never retried without a fresh approval</text>

  <!-- loopback: observe -> triggers -->
  <path class="conn" d="M820,731 C900,731 900,71 823,71" marker-end="url(#a)"/>
  <text class="lab" x="895" y="404" text-anchor="middle" transform="rotate(90 895 404)">iterate — perceive again</text>

  <!-- ============ left column: eval harness + audit ============ -->
  <rect class="panel" x="30" y="150" width="252" height="252" rx="9"/>
  <text class="cap" x="52" y="178" fill="var(--muted)">THE HARNESS IS THE PRODUCT</text>
  <text class="t" x="52" y="203">Eval harness</text>
  <text class="s" x="52" y="223">5 seeded k3s failures — it ships</text>
  <text class="s" x="52" y="239">before the agent does.</text>
  <text class="s" x="52" y="266">Three scores, never averaged:</text>
  <text class="s" x="52" y="287">· verdict — exact root cause</text>
  <text class="s" x="52" y="305">· trajectory — required steps,</text>
  <text class="s" x="66" y="321">in order, evidence cited</text>
  <text class="s" x="52" y="339">· honesty — &#8220;unknown&#8221; beats</text>
  <text class="s" x="66" y="355">a confident lie</text>
  <text class="s" x="52" y="382">every run published with provenance</text>

  <rect class="panel" x="30" y="438" width="252" height="130" rx="9"/>
  <text class="t" x="52" y="468">Audit log — append-only</text>
  <text class="s" x="52" y="491">trigger · trajectory · verdict</text>
  <text class="s" x="52" y="509">proposal · decision · outcome</text>
  <text class="s" x="52" y="536">deny is a logged branch,</text>
  <text class="s" x="52" y="552">not a dead end</text>

  <!-- ============ footer claims ============ -->
  <text class="num" x="30" y="810">1</text>
  <text class="foot-t" x="48" y="810">The gate is human-in-the-loop, not inferred.</text>
  <text class="foot" x="48" y="830">Perceive and plan run freely; crossing into Act takes an explicit human click — never a spoken or written &#8220;yes.&#8221; Deny logs the</text>
  <text class="foot" x="48" y="846">proposal and decision, then returns to observing. A stale approval is re-verified against the live cluster before anything executes.</text>

  <text class="num" x="30" y="880">2</text>
  <text class="foot-t" x="48" y="880">Accuracy is proven, not asserted.</text>
  <text class="foot" x="48" y="900">A public eval harness scores verdict, trajectory, and honesty separately — luck and careful-but-wrong are different failures.</text>
  <text class="foot" x="48" y="916">Every action launches draft-only and graduates only when the numbers clear the bar.</text>
</svg>
