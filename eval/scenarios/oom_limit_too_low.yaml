# Scenario: instant OOMKill — app needs ~128Mi, limit is 32Mi
id: oom_limit_too_low
trigger_expected: oom
known_root_cause: limit_too_low
expected_fix:
  action_id: bump_resources
  params: {deployment: victim-oom-limit, namespace: eval, memory_limit: 256Mi}
wait_for:
  condition: container.last_state.terminated.reason == "OOMKilled"
  timeout_seconds: 180
notes: |
  polinux/stress allocates fast enough that the kernel kills it within seconds.
  --vm-bytes deliberately exceeds the limit by 4x so there's no ambiguity.
  Distinguisher vs oom_leak_sim: dies instantly on start, every restart,
  memory graph is a wall not a ramp. Agent verdict must be limit_too_low,
  not memory_leak — this pair exists to punish coin-flip diagnoses.

setup_manifest: |
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: victim-oom-limit
    namespace: eval
    labels: {eval-scenario: oom_limit_too_low}
  spec:
    replicas: 1
    selector: {matchLabels: {app: victim-oom-limit}}
    template:
      metadata:
        labels: {app: victim-oom-limit, eval-scenario: oom_limit_too_low}
      spec:
        containers:
          - name: app
            image: polinux/stress
            command: ["stress"]
            args: ["--vm", "1", "--vm-bytes", "128M", "--vm-hang", "0"]
            resources:
              requests: {memory: 32Mi, cpu: 50m}
              limits: {memory: 32Mi, cpu: 200m}   # the crime

teardown: |
  kubectl delete deployment,pod -n eval -l eval-scenario=oom_limit_too_low --ignore-not-found --wait=false
